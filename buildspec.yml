version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies"
      - npm install

  build:
    commands:
      - echo "Build phase (no compile needed for simple app)"

  post_build:
    commands:
      - echo "Preparing artifacts"

artifacts:
  files:
    - '**/*'
